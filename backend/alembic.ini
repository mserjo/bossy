# backend/alembic.ini
# # Цей файл є основним конфігураційним файлом для Alembic, інструменту
# # міграції схеми бази даних, що використовується з SQLAlchemy.
# # Він визначає, де знаходяться скрипти міграцій, як підключатися
# # до бази даних, налаштування логування для процесу міграцій та інші
# # важливі параметри, необхідні для управління версіями схеми БД.

# Розділ з основними налаштуваннями Alembic.
[alembic]

# Шлях до директорії зі скриптами міграцій (відносно поточного розташування alembic.ini).
# Оскільки alembic.ini знаходиться в директорії `backend/`, а скрипти міграцій
# та середовище Alembic (`env.py`) знаходяться в `backend/alembic/`,
# значення 'alembic' є коректним.
script_location = alembic

# Шаблон для імен файлів міграцій. За замовчуванням: "%%(rev)s_%%(slug)s".
# rev - ідентифікатор ревізії, slug - коротке повідомлення міграції.
# file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s # Приклад з датою

# Кодування файлів міграцій. Зазвичай UTF-8.
# revision_environment = false # Чи завантажувати повне середовище Python при генерації ревізій (зазвичай false)
# encoding = utf-8

# URL для підключення до бази даних SQLAlchemy.
# ЦЕ НАЙВАЖЛИВІШЕ НАЛАШТУВАННЯ.
# Alembic використовує змінні середовища, вказані у форматі %(ENV_VAR_NAME)s.
# Ці змінні (DB_DRIVER, POSTGRES_USER тощо) повинні бути доступні при запуску команд Alembic.
# Файл `alembic/env.py` зазвичай відповідає за завантаження цих змінних (наприклад, з .env файлу).
# sqlalchemy.url = driver://user:pass@localhost/dbname # Загальний формат
sqlalchemy.url = %(DB_DRIVER)s://%(POSTGRES_USER)s:%(POSTGRES_PASSWORD)s@%(POSTGRES_SERVER)s:%(POSTGRES_PORT)s/%(POSTGRES_DB)s
# Альтернативно, якщо ви формуєте єдину змінну DATABASE_URL в `env.py` або в середовищі:
# sqlalchemy.url = %(DATABASE_URL)s

# Додаткові параметри, які можна передати в create_engine() SQLAlchemy.
# Наприклад, для налаштування пулу з'єднань.
# engine_options = {"pool_size": 10, "max_overflow": 20}

# Чи потрібно виводити SQL запити Alembic в stdout.
# Можливі значення: true, false, sql (тільки SQL), all (SQL + INFO Alembic).
# output_encoding = utf-8 # Кодування для виводу (якщо відрізняється від системного)
# output_buffer = sys.stdout # Куди спрямовувати вивід

# Шлях до файлу конфігурації логування Python для Alembic.
# Якщо не вказано, Alembic використовує налаштування логування нижче.
# logging_config_file = my_logging_config.ini

# Розділ для налаштувань логування Python (використовується, якщо logging_config_file не задано).
# Дозволяє налаштувати рівні логування для різних компонентів.
[loggers]
keys = root,sqlalchemy,alembic # Список логерів для конфігурації

[handlers]
keys = console # Список обробників логів

[formatters]
keys = generic # Список форматувальників логів

[logger_root] # Налаштування кореневого логера
level = WARN # Рівень логування (DEBUG, INFO, WARN, ERROR, CRITICAL)
handlers = console # Обробник (вивід в консоль)
qualname = # Ім'я логера (порожнє для root)

[logger_sqlalchemy] # Налаштування логера для SQLAlchemy
level = WARN # Зазвичай WARN, щоб не бачити кожен SQL запит SQLAlchemy, якщо не потрібно для налагодження
handlers = # Якщо порожньо, успадковує обробники від root
qualname = sqlalchemy.engine # Логує зокрема SQL запити, що генеруються SQLAlchemy

[logger_alembic] # Налаштування логера для Alembic
level = INFO # INFO рівень достатній для перегляду основних кроків міграції
handlers = # Успадковує обробники від root
qualname = alembic # Логує повідомлення від самого Alembic

[handler_console] # Налаштування обробника "console"
class = StreamHandler # Тип обробника (вивід в потік)
args = (sys.stderr,) # Аргументи для StreamHandler (вивід в stderr)
level = NOTSET # Рівень логування для обробника (обробляє всі повідомлення, фільтрація на рівні логера)
formatter = generic # Використовуваний форматувальник

[formatter_generic] # Налаштування форматувальника "generic"
format = %%(levelname)-5.5s [%%(name)s] %%(message)s # Формат повідомлення логу
datefmt = %%H:%%M:%%S # Формат дати/часу (якщо використовується в форматі повідомлення)

# -- Інші можливі, але менш часто змінювані налаштування Alembic --
# Назва таблиці, де Alembic зберігає поточну версію міграції бази даних.
# version_table = alembic_version

# Схема для таблиці version_table, якщо вона знаходиться не в схемі за замовчуванням.
# version_table_schema =

# Директорія для збереження файлів стану (якщо відрізняється від script_location/versions)
# state_path = .alembic_state

# render_as_batch: Важливо для SQLite та деяких інших сценаріїв (наприклад, для СУБД,
# що не підтримують ALTER TABLE для деяких операцій без перестворення таблиці).
# Зазвичай налаштовується в `env.py` через `context.configure(render_as_batch=True)`.
# Тут це налаштування має менший пріоритет, ніж в `env.py`.
# render_as_batch = false

# timezone: Часовий пояс для міток часу у файлах міграцій.
# timezone = UTC
