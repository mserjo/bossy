# backend/alembic.ini
# # Файл конфігурації для Alembic, інструменту міграції бази даних для SQLAlchemy.
# # Тут визначаються основні параметри роботи Alembic.

# Розділ з основними налаштуваннями Alembic.
[alembic]

# Шлях до директорії зі скриптами міграцій (відносно поточного розташування alembic.ini).
# Зазвичай це 'alembic', якщо alembic.ini знаходиться в корені проекту,
# або відносний шлях, якщо структура інша.
# В нашому випадку, якщо alembic.ini в backend/, а скрипти в backend/alembic/, то це буде 'alembic'.
script_location = alembic

# Шаблон для імен файлів міграцій.
# file_template = %%(rev)s_%%(slug)s

# Кодування файлів міграцій.
# revision_environment = false
# encoding = utf-8

# URL для підключення до бази даних SQLAlchemy.
# ЦЕ НАЙВАЖЛИВІШЕ НАЛАШТУВАННЯ.
# Воно повинно бути замінене на реальний URL вашої бази даних.
# Рекомендується використовувати змінні середовища для безпеки та гнучкості.
# Alembic автоматично шукає значення в змінних середовища, якщо вони вказані у форматі %(ENV_VAR_NAME)s.
# Наприклад, в env.py можна буде отримати це значення.
# Ми будемо завантажувати URL бази даних з змінних середовища в файлі alembic/env.py,
# тому тут можна залишити посилання на змінну або тимчасове значення.
# sqlalchemy.url = driver://user:pass@localhost/dbname
sqlalchemy.url = %(DB_DRIVER)s://%(POSTGRES_USER)s:%(POSTGRES_PASSWORD)s@%(POSTGRES_SERVER)s:%(POSTGRES_PORT)s/%(POSTGRES_DB)s
# Або, якщо ви формуєте повний DATABASE_URL в env.py:
# sqlalchemy.url = %(DATABASE_URL)s

# Додаткові параметри, які можна передати в create_engine() SQLAlchemy.
# engine_options = {}

# Чи потрібно виводити SQL запити Alembic в stdout.
# true, false, або sql (тільки SQL), або all (SQL + INFO).
# output_encoding = utf-8
# output_buffer = sys.stdout

# Шлях до файлу логування для Alembic.
# logging_config_file =

# Розділ для налаштувань логування Python.
# Якщо logging_config_file не вказано, Alembic налаштує базове логування.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %%(levelname)-5.5s [%%(name)s] %%(message)s
datefmt = %%H:%%M:%%S

# -- Інші можливі налаштування --
# Версія схеми бази даних (якщо використовується)
# version_table = alembic_version
# version_table_schema =

# Директорія для збереження файлів стану (якщо відрізняється від script_location)
# state_path = .alembic_state

# Чи дозволяти розгалуження міграцій (multiple heads)
# Вимагає уважного менеджменту. За замовчуванням false з Alembic 1.x, але часто потрібно true.
# Налаштовується в env.py через context.configure(render_as_batch=True) для SQLite,
# або для інших БД можна залишити як є, якщо не планується розгалуження.
# render_as_batch = false # для SQLite
