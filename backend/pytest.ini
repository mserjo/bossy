# backend/pytest.ini
# # Файл конфігурації для Pytest.
# # Дозволяє налаштувати поведінку Pytest, шляхи до тестів, маркери тощо.

[pytest]
# --- Шляхи та шаблони файлів ---
# Директорії, де Pytest буде шукати тести.
# Припускаємо, що тести знаходяться в папці 'tests' всередині 'app'.
testpaths = app/tests

# Шаблони для файлів, що містять тести.
python_files = test_*.py tests_*.py *_test.py *_tests.py

# Шаблони для класів, що містять тести.
python_classes = Test* *Tests

# Шаблони для функцій, що є тестами.
python_functions = test_*

# --- Опції за замовчуванням ---
# Додаткові опції командного рядка, які будуть застосовані за замовчуванням.
# -vv: Більш детальний вивід.
# --cov=app: Вказує Pytest-cov вимірювати покриття для директорії 'app'.
# --cov-report=term-missing: Показувати номери рядків, що не покриті тестами.
# --cov-report=html: Генерувати HTML звіт про покриття в папці htmlcov/.
# --cov-fail-under=80: Вважати тест неуспішним, якщо покриття менше 80%. (Встановіть бажаний відсоток)
addopts =
    -vv
    --cov=app
    --cov-report=term-missing
    --cov-report=html:htmlcov
    # --cov-fail-under=80

# --- Налаштування маркерів ---
# Реєстрація кастомних маркерів для групування або маркування тестів.
# Приклад:
# markers =
#     slow: для тестів, що виконуються довго
#     integration: для інтеграційних тестів
#     unit: для юніт-тестів

# --- Налаштування покриття коду (Pytest-cov) ---
# Вже частково налаштовано через addopts.
# Можна додати виключення для файлів або директорій, які не потрібно враховувати в покритті.
# [coverage:run]
# omit =
#     app/main.py
#     app/core/config.py
#     app/db/session.py
#     app/db/init_db.py
#     app/tests/*
#     */__init__.py

# --- Налаштування для асинхронних тестів (Pytest-asyncio) ---
# 'auto' автоматично визначає та запускає асинхронні тести.
# 'strict' вимагає явного маркування асинхронних тестів (@pytest.mark.asyncio).
asyncio_mode = auto

# --- Інші налаштування ---
# Наприклад, шлях до лог-файлу Pytest.
# log_file = pytest.log
# log_file_level = INFO

# Вимкнути попередження про кеш (якщо заважає)
# cache_dir = .pytest_cache
