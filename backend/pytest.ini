# backend/pytest.ini
# # Цей файл є конфігураційним файлом для фреймворку тестування Pytest.
# # Він дозволяє централізовано налаштувати поведінку Pytest під час запуску тестів,
# # включаючи шляхи до тестових файлів, стандартні опції командного рядка,
# # реєстрацію маркерів, налаштування плагінів (наприклад, pytest-cov для покриття коду)
# # та інші специфічні параметри для вашого проекту.

[pytest]
# --- Шляхи та шаблони пошуку тестових файлів ---
# Директорії, де Pytest буде шукати тести.
# Відповідно до структури проекту, тести знаходяться в 'app/tests'.
testpaths = app/tests

# Шаблони імен файлів, що містять тести.
python_files = test_*.py tests_*.py *_test.py *_tests.py

# Шаблони імен класів, що містять тестові методи.
python_classes = Test* *Tests

# Шаблони імен функцій, що є тестами.
python_functions = test_*

# --- Опції командного рядка за замовчуванням (addopts) ---
# Ці опції будуть автоматично додаватися при кожному запуску pytest.
# -vv: Збільшений рівень деталізації виводу (verbose).
# --cov=app: Вказує плагіну pytest-cov вимірювати покриття коду для директорії 'app' (тобто backend/app).
#            Це включає app/main.py та все, що в app/src/.
# --cov-report=term-missing: Показувати у терміналі звіт про рядки, не покриті тестами.
# --cov-report=html:htmlcov: Генерувати HTML-звіт про покриття коду в директорії 'htmlcov/'.
# --cov-fail-under=X: (Закоментовано) Вважати виконання тестів неуспішним, якщо загальне покриття коду нижче X%.
#                     Розкоментуйте та встановіть бажаний відсоток (наприклад, 80).
addopts =
    -vv
    --cov=app
    --cov-report=term-missing
    --cov-report=html:htmlcov
    # --cov-fail-under=80

# --- Реєстрація користувацьких маркерів (markers) ---
# Маркери дозволяють групувати тести та вибірково їх запускати.
# Приклад:
# markers =
#     slow: для тестів, виконання яких займає багато часу
#     integration: для інтеграційних тестів, що перевіряють взаємодію компонентів
#     unit: для юніт-тестів, що перевіряють окремі модулі або функції

# --- Налаштування плагіна покриття коду (pytest-cov) ---
# Додаткові налаштування для pytest-cov, якщо опцій в 'addopts' недостатньо.
# Секція [coverage:run] дозволяє, наприклад, вказати файли, які слід виключити з аналізу покриття.
# Приклад виключення файлів (розкоментуйте та налаштуйте шляхи відповідно до вашого проекту):
# [coverage:run]
# omit =
#     app/main.py                # Головний файл додатку, часто містить лише ініціалізацію
#     app/src/config/*           # Файли конфігурації
#     app/src/db/session.py      # Налаштування сесії БД
#     app/src/db/init_db.py      # Скрипт ініціалізації БД
#     app/tests/*                # Власне тестові файли
#     */__init__.py              # Файли __init__.py зазвичай не містять логіки для тестування

# --- Налаштування для асинхронних тестів (плагін pytest-asyncio) ---
# 'auto': Pytest-asyncio автоматично визначає та запускає асинхронні тестові функції.
# 'strict': Вимагає явного маркування асинхронних тестів за допомогою @pytest.mark.asyncio.
# Режим 'auto' зазвичай зручніший для більшості проектів.
asyncio_mode = auto

# --- Інші можливі налаштування Pytest ---
# Наприклад, шлях до лог-файлу для запису результатів виконання тестів.
# log_file = pytest_run.log
# log_file_level = INFO # Рівень логування

# Вимкнення попереджень про кеш Pytest (якщо вони заважають або не потрібні).
# cache_dir = .pytest_cache
