# docker-compose.dev.yml
# # Цей файл Docker Compose розширює базовий `docker-compose.yml`
# # та додає конфігурації, специфічні для середовища розробки.
# # Основна мета - забезпечити зручність розробки, наприклад,
# # шляхом монтування коду для "живого" перезавантаження та використання
# # локальних файлів конфігурації.

version: '3.8' # Використання тієї ж версії, що і в базовому файлі

services:
  backend:
    # Розширює сервіс backend з docker-compose.yml
    # Для розробки ми хочемо використовувати bind mount для миттєвого оновлення коду
    volumes:
      - ./backend:/app # Монтування коду backend в контейнер для live-reload
    # Dockerfile для розробки може бути іншим або використовувати іншу стадію,
    # якщо у вас багатостадійний Dockerfile (наприклад, з dev-залежностями)
    # build:
    #   context: ./backend
    #   dockerfile: Dockerfile # Або Dockerfile.dev, якщо є
    #   target: development # Якщо є така стадія в Dockerfile, що містить інструменти для розробки
    env_file:
      - ./backend/.env # Завантаження змінних середовища для розробки
    # Команда може бути переписана для запуску з live-reload,
    # наприклад, uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    # command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app
    ports:
      - "8000:8000" # Переконайтеся, що порт той самий, що й у базовому файлі, або оновіть за потреби

  # Сервіс db зазвичай успадковується з основного docker-compose.yml без змін для dev,
  # але можна перевизначити, якщо потрібно (наприклад, інший порт або конфігурація).
  # db:
  #   ports:
  #     - "5433:5432" # Приклад: інший порт для локальної розробки, щоб не конфліктувати з іншими екземплярами БД

# --- Опціональні сервіси для розробки ---
# Можна додати сервіси, специфічні для розробки, наприклад, Mailhog для тестування email або Adminer для управління БД.

#   mailhog:
#     image: mailhog/mailhog # Образ Mailhog
#     container_name: project_mailhog # Чітке ім'я контейнера для Mailhog
#     ports:
#       - "1025:1025" # SMTP порт, на який надсилатимуться листи з додатку
#       - "8025:8025" # Веб-інтерфейс Mailhog для перегляду листів
#     restart: unless-stopped # Політика перезапуску

#   adminer:
#     image: adminer # Образ Adminer - легковий інструмент для управління БД
#     container_name: project_adminer # Чітке ім'я контейнера для Adminer
#     ports:
#       - "8080:8080" # Порт для доступу до веб-інтерфейсу Adminer
#     restart: unless-stopped # Політика перезапуску
#     depends_on: # Залежність від сервісу бази даних
#       - db # Adminer не запуститься, доки сервіс db не буде доступний

# Мережі та томи успадковуються з docker-compose.yml, якщо не перевизначені.
# Якщо потрібні специфічні для розробки мережі або томи, їх можна визначити тут.
