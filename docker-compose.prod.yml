# docker-compose.prod.yml
# # Цей файл Docker Compose розширює базовий `docker-compose.yml`
# # та містить конфігурації, оптимізовані для продуктивного середовища.
# # Налаштування тут спрямовані на стабільність, безпеку та продуктивність.
# # Наприклад, вимкнення режиму налагодження, використання продуктивних
# # змінних середовища та відповідні політики перезапуску сервісів.

version: '3.8' # Використання тієї ж версії, що і в базовому файлі

services:
  backend:
    # Розширює сервіс backend з docker-compose.yml
    # Для продуктиву код має бути вбудований в образ, тому volumes для коду не використовуються.
    # build: # Можна перевизначити, якщо для продуктиву використовується інша стадія Dockerfile
    #   context: ./backend
    #   dockerfile: Dockerfile
    #   target: production # Якщо є така стадія в Dockerfile, оптимізована для продуктиву
    env_file:
      - ./backend/.env.prod # Використання окремого файлу .env.prod для продуктивних налаштувань.
                           # УВАГА: Якщо цей файл містить реальні секрети, він НЕ ПОВИНЕН потрапляти
                           # у систему контролю версій без шифрування або інших заходів безпеки.
                           # В ідеалі, секрети надаються інфраструктурою розгортання (напр. Kubernetes Secrets, CI/CD змінні).
                           # Якщо .env.prod не використовується для секретів, а лише для нечутливих налаштувань,
                           # або якщо змінні надаються іншим способом, закоментуйте або видаліть цю строку.
    restart: always # Політика перезапуску для стабільності в продуктивному середовищі
    # ports: # Порти для backend сервісу зазвичай не прокидаються напряму в продуктивному середовищі.
    #        # Доступ до сервісу налаштовується через reverse proxy (наприклад, Nginx або Traefik).
    #   - "80:8000" # Приклад: мапінг на стандартний HTTP порт, якщо немає reverse proxy
    # command: gunicorn -k uvicorn.workers.UvicornWorker app.main:app --bind 0.0.0.0:8000 -w 4 # Приклад команди для запуску з Gunicorn в продуктиві.
                                                                                           # Кількість воркерів (-w) слід налаштовувати відповідно до ресурсів сервера.

  db:
    # Сервіс db зазвичай успадковується з основного docker-compose.yml.
    # Переконайтеся, що змінні POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB
    # встановлені надійно для продуктивного середовища.
    env_file:
      - ./backend/.env.prod # Переконайтеся, що цей файл містить продуктивні облікові дані для БД.
                           # Застосовуються ті ж самі застереження щодо безпеки, що й для backend.env.prod.
    restart: always # Політика перезапуску для стабільності бази даних
    # У продуктивному середовищі порт бази даних зазвичай не прокидається назовні,
    # доступ до неї відбувається через внутрішню мережу Docker з боку backend сервісу.
    # ports:
    #  - "5432:5432" # Видаліть або закоментуйте, якщо не потрібен зовнішній доступ до БД.

# Томи та мережі успадковуються з docker-compose.yml.
# Для продуктиву можуть бути додані спеціалізовані сервіси для моніторингу (Prometheus, Grafana),
# централізованого логування (ELK stack, Loki), тощо.

# --- Опціональний сервіс Nginx (Reverse Proxy) ---
# Приклад додавання Nginx reverse proxy для обробки HTTP(S) запитів, SSL-термінації та статичного контенту.
# nginx:
#   image: nginx:stable-alpine # Рекомендований образ Nginx
#   container_name: project_nginx # Чітке ім'я контейнера для Nginx
#   ports:
#     - "80:80"    # Стандартний HTTP порт
#     - "443:443"  # Стандартний HTTPS порт (якщо налаштовано SSL)
#   volumes:
#     - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro # Монтування файлу конфігурації Nginx (тільки для читання)
#     # - ./nginx/certs:/etc/nginx/certs:ro        # Монтування SSL сертифікатів (тільки для читання)
#     # - ./static:/var/www/static:ro              # Приклад монтування статичних файлів
#   depends_on: # Залежність від backend сервісу
#     - backend # Nginx не запуститься або не зможе правильно проксіювати запити, доки backend не буде готовий
#   restart: always # Політика перезапуску для Nginx
