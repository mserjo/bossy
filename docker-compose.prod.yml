# docker-compose.prod.yml
# Цей файл Docker Compose призначений для продуктивного середовища.
# Він розширює базовий `docker-compose.yml` та адаптує налаштування для стабільної
# та безпечної роботи додатку в продакшені. Ключові відмінності включають
# використання продуктивних змінних середовища, відсутність монтування коду
# (код вбудовується в образ) та налаштування для надійності.

version: '3.8' # Повинна співпадати з версією в docker-compose.yml

services:
  backend:
    # Розширює та частково перевизначає сервіс `backend` з `docker-compose.yml`.
    # В продуктивному середовищі код додатку має бути вбудований безпосередньо в Docker образ.
    # Тому секція `volumes` для монтування коду тут не використовується.
    # Якщо для продуктивної збірки використовується окрема стадія в Dockerfile (наприклад, `production`),
    # це має бути вказано в `docker-compose.yml` або тут, якщо збірка перевизначається.
    # build:
    #   context: ./backend
    #   dockerfile: Dockerfile
    #   target: production # Якщо є стадія 'production' у вашому Dockerfile

    # Завантаження змінних середовища для продуктивного середовища.
    # Рекомендується використовувати окремий файл `.env.prod` для налаштувань продакшену.
    # Цей файл НІКОЛИ не повинен додаватися до системи контролю версій.
    # Альтернативно, змінні середовища можуть надаватися інфраструктурою розгортання (CI/CD, PaaS).
    env_file:
      - ./backend/.env.prod # Переконайтеся, що цей файл існує та містить продуктивні налаштування

    # Політика перезапуску для забезпечення високої доступності сервісу.
    restart: always

    # Команда для запуску додатку в продуктивному режимі.
    # Використовуйте Gunicorn з Uvicorn воркерами для FastAPI.
    # Кількість воркерів (`-w`) може бути налаштована залежно від ресурсів сервера.
    # Зазвичай (2 * кількість_ядер_CPU) + 1.
    command: gunicorn -k uvicorn.workers.UvicornWorker app.main:app --bind 0.0.0.0:8000 -w 4

    # Порти: в продуктивному середовищі backend-сервіс часто працює за reverse proxy (наприклад, Nginx),
    # який обробляє вхідні HTTP/HTTPS запити.
    # Якщо reverse proxy використовується, прокидання порту backend на хост може не знадобитися
    # або порт буде доступний тільки для reverse proxy у внутрішній мережі.
    # ports:
    #   - "8000:8000" # Може бути закоментовано, якщо використовується reverse proxy

  db:
    # Сервіс `db` успадковується з `docker-compose.yml`.
    # Переконайтеся, що змінні POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB
    # надійно налаштовані для продуктивного середовища через `./backend/.env.prod`
    # або інший механізм керування секретами.
    env_file:
      - ./backend/.env.prod # Забезпечує завантаження продуктивних креданлів для БД

    restart: always # Політика перезапуску для бази даних

    # В продуктивному середовищі порт бази даних (5432) зазвичай НЕ прокидається назовні
    # для підвищення безпеки. Доступ до бази даних має здійснюватися лише з боку
    # backend сервісу через внутрішню мережу Docker.
    # ports:
    #  - "5432:5432" # ЗАКОМЕНТУЙТЕ або ВИДАЛІТЬ ЦЕЙ РЯДОК для продакшену

# Томи та мережі успадковуються з `docker-compose.yml`.
# Для продуктивного середовища можуть бути додані додаткові сервіси,
# такі як Nginx для reverse proxy, Elasticsearch/Kibana для логування, Prometheus/Grafana для моніторингу.

# --- Приклад конфігурації Nginx як reverse proxy (опціонально) ---
# nginx:
#   image: nginx:stable-alpine
#   container_name: app_nginx_prod
#   ports:
#     - "80:80"    # Стандартний HTTP порт
#     - "443:443"  # Стандартний HTTPS порт (якщо налаштовано SSL/TLS)
#   volumes:
#     # Монтування конфігураційного файлу Nginx (тільки для читання)
#     - ./path_to_your_nginx_config/nginx.conf:/etc/nginx/nginx.conf:ro
#     # Монтування SSL сертифікатів (якщо використовуються)
#     # - ./path_to_your_ssl_certs:/etc/nginx/certs:ro
#     # Монтування статичних файлів (якщо Nginx їх роздає)
#     # - ./backend/static:/usr/share/nginx/html/static:ro # Приклад шляху до статики
#   depends_on:
#     - backend # Nginx залежить від backend сервісу
#   restart: always
#   networks: # Переконайтеся, що Nginx та backend знаходяться в одній мережі
#     - default # Використовує мережу за замовчуванням, визначену Docker Compose
              # або вкажіть кастомну мережу, якщо вона визначена.
